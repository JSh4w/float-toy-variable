<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FloatXRNE Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
      <h1>FloatXRNE Visualizer</h1>
      
      <div class="info-block">
        <p>This tool demonstrates the FloatXRNE custom floating-point implementation. You can configure the bit layout, input values, and see both binary representation and decimal values.</p>
      </div>
      
      <h2>Configuration</h2>
      <div class="float-controls">
        <label>Format:</label>
        <select id="format-select">
          <option value="custom">Custom</option>
          <option value="f16">Half Precision (16-bit)</option>
          <option value="f32" selected>Single Precision (32-bit)</option>
          <option value="f64">Double Precision (64-bit)</option>
        </select>
        
        <label>Exponent Width:</label>
        <input type="number" id="exp-width" min="2" max="16" value="8">
        
        <label>Mantissa Width:</label>
        <input type="number" id="mant-width" min="1" max="52" value="23">
        
        <button id="apply-format">Apply Format</button>
      </div>
      
      <h2>Input Value</h2>
      <div class="float-controls">
        <label>Decimal:</label>
        <input type="text" id="decimal-input" value="3.14159">
        
        <label>Hex:</label>
        <input type="text" id="hex-input" value="">
        
        <button id="update-value">Update</button>
        
        <select id="preset-values">
          <option value="">Common Values</option>
          <option value="0">Zero (0)</option>
          <option value="-0">Negative Zero (-0)</option>
          <option value="1">One (1)</option>
          <option value="-1">Negative One (-1)</option>
          <option value="3.14159">Pi (approx)</option>
          <option value="2.71828">e (approx)</option>
          <option value="Infinity">Infinity</option>
          <option value="-Infinity">Negative Infinity</option>
          <option value="NaN">NaN</option>
          <option value="1e-10">Very Small (1e-10)</option>
          <option value="1e10">Very Large (1e10)</option>
        </select>
      </div>
      
      <h2>Binary Representation</h2>
      <div class="bit-display">
        <table id="bit-table">
          <tr id="bit-indices"></tr>
          <tr id="bit-values"></tr>
        </table>
      </div>
      
      <div class="output-section">
        <div class="output-row">
          <span class="output-label">Sign:</span>
          <span id="sign-value" class="output-value"></span>
        </div>
        <div class="output-row">
          <span class="output-label">Exponent:</span>
          <span id="exponent-value" class="output-value"></span>
        </div>
        <div class="output-row">
          <span class="output-label">Mantissa:</span>
          <span id="mantissa-value" class="output-value"></span>
        </div>
        <div class="output-row">
          <span class="output-label">Formula:</span>
          <span id="formula-value" class="output-value"></span>
        </div>
        <div class="output-row">
          <span class="output-label">Decimal:</span>
          <span id="decimal-value" class="output-value"></span>
        </div>
      </div>
    </div>
  
    <script type="module">
      import {FloatXRNE} from './floatXRNE.js';
      
      // UI Handling
      let floatX;
      let expWidth = 8;
      let mantWidth = 23;
      
      // Initialize with default settings
      initializeFloat();
      
      // Set up event listeners
      document.getElementById('format-select').addEventListener('change', function() {
        const format = this.value;
        if (format === 'f16') {
          document.getElementById('exp-width').value = 5;
          document.getElementById('mant-width').value = 10;
        } else if (format === 'f32') {
          document.getElementById('exp-width').value = 8;
          document.getElementById('mant-width').value = 23;
        } else if (format === 'f64') {
          document.getElementById('exp-width').value = 11;
          document.getElementById('mant-width').value = 52;
        }
      });
      
      document.getElementById('apply-format').addEventListener('click', function() {
        const newExpWidth = parseInt(document.getElementById('exp-width').value);
        const newMantWidth = parseInt(document.getElementById('mant-width').value);
        
        // Validate inputs
        if (newExpWidth < 2 || newExpWidth > 16) {
          alert('Exponent width must be between 2 and 16');
          return;
        }
        
        if (newMantWidth < 1 || newMantWidth > 52) {
          alert('Mantissa width must be between 1 and 52');
          return;
        }
        
        expWidth = newExpWidth;
        mantWidth = newMantWidth;
        
        initializeFloat();
      });
      
      document.getElementById('update-value').addEventListener('click', updateFromDecimal);
      document.getElementById('decimal-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          updateFromDecimal();
        }
      });
      
      document.getElementById('hex-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          updateFromHex();
        }
      });
      
      document.getElementById('preset-values').addEventListener('change', function() {
        if (this.value) {
          document.getElementById('decimal-input').value = this.value;
          updateFromDecimal();
          this.selectedIndex = 0;
        }
      });
      
      function initializeFloat() {
        floatX = new FloatXRNE(1, expWidth, mantWidth);
        console.log(floatX);
        
        // Initialize with PI or current value
        const currentValue = document.getElementById('decimal-input').value || '3.14159';
        try {
          floatX.setFloatXRNE(0, parseFloat(0)); // clear value to zero 
        } catch (e) {
          console.error("Error initializing float:", e);
          document.getElementById('decimal-input').value = '3.14159';
          floatX.setFloatXRNE(0, 3.14159);
        }
        floatX.setFloatXRNE(0, 3.14159);
        // Update bit table
        updateBitTable();
        
        // Update displays
        updateDisplays();
      }
            
      function updateBitTable() {
        const bitIndices = document.getElementById('bit-indices');
        const bitValues = document.getElementById('bit-values');
        
        // Clear existing rows
        bitIndices.innerHTML = '';
        bitValues.innerHTML = '';
        
        // Get bits as string
        const bitString = floatX.getFloatXRNEBitString(0);
        
        // Calculate bit positions needed
        const startBit = 64 - floatX.width;  // Where to start in the 64-bit representation
        
        // Create table based on bit layout
        for (let i = 0; i < 64; i++) {
          const bitPosition = 63 - i;
          
          // Only show bits that are part of our format
          if (bitPosition >= startBit) {
            // Add index cell
            const indexCell = document.createElement('th');
            indexCell.className = 'bit-index';
            indexCell.textContent = bitPosition - startBit;
            bitIndices.appendChild(indexCell);
            
            // Add value cell with appropriate class
            const valueCell = document.createElement('td');
            valueCell.className = 'bit-cell';
            valueCell.textContent = bitString[i];
            
            // Add appropriate coloring
            if (bitPosition === 63) {
              valueCell.classList.add('sign');
            } else if (bitPosition >= startBit + mantWidth && bitPosition < 63) {
              valueCell.classList.add('exponent');
            } else {
              valueCell.classList.add('fraction');
            }
            
            // Add click handler to toggle bits
            valueCell.addEventListener('click', function() {
              toggleBit(bitPosition);
            });
            
            bitValues.appendChild(valueCell);
          }
        }
      }
      
      function toggleBit(position) {
        console.log(position);
        const normBit = position - (64 - floatX.width) ;
        console.log(normBit);
        const bits = floatX.getFloatXRNEBits(0);
        const newBits = bits ^ (1n << BigInt(normBit));
        
        // Update the bits directly
        new BigInt64Array(floatX.storage.buffer)[0] = newBits;
        
        // Update the displays
        updateBitTable();
        updateDisplays();
      }
      
      function updateDisplays() {
        try {
          // Get the components
          const bits = floatX.getFloatXRNEBits(0);
          const sign = (bits >> BigInt(floatX.width -1)) & 1n;
          
          // Calculate the position of exponent and mantissa in the 64-bit value
          const expBits = (bits >> BigInt(floatX.mantWidth)) & floatX.expMask;
          const mantBits = bits & floatX.mantMask;
          
          // Calculate actual values
          const signValue = sign === 1n ? -1 : 1;
          let expValue, mantValue;
          
          // Special cases
          const value = floatX.getFloatXRNE(0);
          
          if (!Number.isFinite(value)) {
            if (Number.isNaN(value)) {
              expValue = "NaN";
              mantValue = "NaN";
            } else {
              expValue = "Infinity";
              mantValue = "0";
            }
          } else if (value === 0) {
            expValue = "0";
            mantValue = "0";
          } else {
            expValue = Number(expBits - floatX.expBias);
            mantValue = Number(mantBits) / (2 ** floatX.mantWidth);
          }
          
          // Update the display elements
          document.getElementById('sign-value').textContent = sign === 1n ? "-1" : "+1";
          document.getElementById('exponent-value').textContent = `${expBits} (unbiased), ${expValue} (biased)`;
          document.getElementById('mantissa-value').textContent = `${mantBits} (raw), ${mantValue === 0 ? "0" : `1.${mantValue.toString().substring(2) || '0'}`} (value)`;
          
          // Special cases for formula display
          if (!Number.isFinite(value)) {
            if (Number.isNaN(value)) {
              document.getElementById('formula-value').textContent = 'NaN';
            } else {
              document.getElementById('formula-value').textContent = `${value < 0 ? '-' : ''}Infinity`;
            }
          } else if (value === 0) {
            document.getElementById('formula-value').textContent = `${Object.is(value, -0) ? '-' : ''}0`;
          } else if (expBits === 0n && mantBits !== 0n) {
            // Denormal number
            document.getElementById('formula-value').textContent = `${signValue} × 2^${1-Number(floatX.expBias)} × ${mantValue}`;
          } else {
            document.getElementById('formula-value').textContent = `${signValue} × 2^${expValue} × ${1 + mantValue}`;
          }
          
          document.getElementById('decimal-value').textContent = value;
          
          const pad = Math.ceil(floatX.width /4); 
          const hexString = bits.toString(16).padStart(pad, '0').toUpperCase();
          document.getElementById('hex-input').value = hexString;
        } catch (e) {
          console.error("Error updating displays:", e);
          document.getElementById('formula-value').textContent = "Error: " + e.message;
        }
      }
      
      function updateFromDecimal() {
        const input = document.getElementById('decimal-input').value;
        let value;
        
        try {
          // Handle special values
          if (input.toLowerCase() === 'nan') {
            value = NaN;
          } else if (input.toLowerCase() === 'infinity' || input === 'Inf') {
            value = Infinity;
          } else if (input.toLowerCase() === '-infinity' || input === '-Inf') {
            value = -Infinity;
          } else if (input === '-0') {
            value = -0;
          } else {
            value = parseFloat(input);
            if (isNaN(value) && input !== 'NaN') {
              alert('Invalid number format');
              return;
            }
          }
          
          floatX.setFloatXRNE(0, value);
          updateBitTable();
          updateDisplays();
        } catch (e) {
          console.error("Error updating from decimal:", e);
          alert('Error: ' + e.message);
        }
      }
      
      function updateFromHex() {
        try {
          const hexValue = document.getElementById('hex-input').value.replace(/^0x/i, '');
          if (!/^[0-9A-Fa-f]+$/.test(hexValue)) {
            throw new Error("Invalid hexadecimal format");
          }
          
          const hexBits = BigInt(`0x${hexValue}`);
          
          // Update the bits directly
          new BigInt64Array(floatX.storage.buffer)[0] = hexBits;
          
          // Get the new value and update displays
          updateBitTable();
          updateDisplays();
          
          // Update the decimal input
          document.getElementById('decimal-input').value = floatX.getFloatXRNE(0);
        } catch (e) {
          console.error("Error updating from hex:", e);
          alert('Error: ' + e.message);
        }
      }
    </script>
  </body>
  </html>
